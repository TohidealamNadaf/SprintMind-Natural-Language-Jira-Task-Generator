<div class="app-container">
  <header>
    <h1>SprintMind</h1>
    <p>Feature Brief → Jira Tickets Pipeline</p>
  </header>

  <main>
    <div class="left-panel">
      <h2>1. Feature Brief</h2>
      <textarea [(ngModel)]="brief" placeholder="Describe the feature you want to build..."></textarea>
      <button (click)="generateTickets()" [disabled]="loading || !brief.trim()">
        {{ loading ? 'Generating...' : 'Generate Tickets' }}
      </button>
      <div *ngIf="message" class="message">{{ message }}</div>
    </div>

    <div class="right-panel">
      <h2>2. Preview Tickets</h2>
      <div class="actions" *ngIf="tickets.length > 0">
        <button class="push-btn" (click)="pushToJira()" [disabled]="pushing">
          {{ pushing ? 'Pushing to Jira...' : 'Push to Jira' }}
        </button>
      </div>
      
      <div class="tickets-container" *ngIf="tickets.length > 0">
        <app-ticket-card *ngFor="let ticket of tickets" [ticket]="ticket"></app-ticket-card>
      </div>
      <div class="empty-state" *ngIf="tickets.length === 0 && !loading">
        No tickets generated yet.
      </div>
      <div class="loading-state" *ngIf="loading">
        Analyzing brief and generating tickets via Gemini...
      </div>
    </div>
  </main>
</div>
