<div class="ticket-card">
  <div class="header">
    <span class="type-badge" [ngClass]="ticket.type.toLowerCase()">{{ ticket.type }}</span>
    <span class="story-points" *ngIf="ticket.story_points">{{ ticket.story_points }} pts</span>
  </div>
  <h3>{{ ticket.title }}</h3>
  <p class="description">{{ ticket.description }}</p>
  
  <div class="ac-section" *ngIf="ticket.acceptance_criteria?.length">
    <h4>Acceptance Criteria:</h4>
    <ul>
      <li *ngFor="let ac of ticket.acceptance_criteria">{{ ac }}</li>
    </ul>
  </div>
  
  <div class="parent" *ngIf="ticket.parent">
    <strong>Parent:</strong> {{ ticket.parent }}
  </div>
</div>
